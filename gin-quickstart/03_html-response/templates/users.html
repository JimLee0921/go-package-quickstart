<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ .title }}</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
<h1>{{ .title }}</h1>

<table>
    <thead>
    <tr>
        <th>性名</th>
        <th>年龄</th>
    </tr>
    </thead>
    <tbody>
    {{ range .users }}
    <tr>
        <td>{{ .name }}</td>
        <td>{{ .age }}</td>
    </tr>
    {{ end }}
    </tbody>
</table>
</body>
</html>
